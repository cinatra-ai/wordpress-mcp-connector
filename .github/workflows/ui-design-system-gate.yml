name: ui-design-system-gate

# Thin caller for the org-wide shadcn design-system gate
# (org-wide rollout to the applicable-repo
# inventory). This repo's eslint.config.mjs spreads the preset vendored
# byte-identically at tools/ui-design-system.flat.mjs from the SAME ci
# commit this caller pins, so the workflow and the config it runs are
# pinned together.
#
# The preset is this repo's ENTIRE lint surface (no pre-existing ESLint
# debt to filter around, unlike the cinatra monorepo caller), so the gate
# runs plain ESLint and gates on its exit code: any boundary error or
# fatal parse failure fails; warn-level raw-JSX findings are printed
# without failing until ramped to error. --no-inline-config keeps the
# "exemptions are files-glob carve-outs, never inline eslint-disable"
# contract enforceable.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ui-design-system-gate:
    uses: cinatra-ai/ci/.github/workflows/ui-design-system-gate.yml@83ca29ef8df0a33d11ba02568c61f2fdc56a3eaf # v0.1.1
    with:
      ui_globs: "**/components/ui/**,**/src/ui/**"
      strictness: error
      lint_command: npx eslint . --no-inline-config
