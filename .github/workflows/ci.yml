name: ci

# Standalone CI for an extracted Cinatra extension repo.
#
# This is the baseline gate applied to EVERY extracted extension. Kind-specific
# gates are appended to the `kind-gates` job per the extension's `cinatra.kind`:
#   - workflow  -> package shape + cinatra/workflow.bpmn sanity
#   - agent     -> cinatra/oas.json retired-primitive scan
# Both run the self-contained, zero-dependency `extension-kind-gate.mjs` shipped
# in this repo (plain `node`, no @cinatra-ai dependency) so CI passes even before
# the @cinatra-ai registry is reachable. The extraction script appends those
# steps when it materializes the repo; the placeholder step below documents the
# contract for kinds with no extra gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    # Dep-carrying repos (connectors, artifacts with first-party deps) resolve
    # @cinatra-ai/* packages from the AUTHENTICATED marketplace registry — it is
    # not anonymous public-read by design. The org-level CINATRA_REGISTRY_TOKEN
    # secret (a readonly consumer token) authenticates `pnpm install`; the repo's
    # generated .npmrc references it as ${CINATRA_REGISTRY_TOKEN}. Standalone repos
    # (skills/agents/etc.) resolve nothing from the registry and ignore it. GitHub
    # withholds the secret from fork PRs by design, so a fork PR to a dep-carrying
    # repo cannot install (expected; CI runs on push to main).
    env:
      CINATRA_REGISTRY_TOKEN: ${{ secrets.CINATRA_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        # Extracted repos ship NO committed lockfile, so resolve fresh rather
        # than fail on a frozen lockfile.
        run: corepack pnpm install --no-frozen-lockfile

      - name: Typecheck
        # Typecheck the repo's OWN TypeScript sources. Branch on what the repo
        # declares (not on a command's exit code, which `pnpm run --if-present`
        # makes 0 even when the script is absent). ORDER MATTERS — an explicit
        # `typecheck` script is authoritative and runs FIRST, so a repo that
        # declares one can never be skipped, whatever its file extensions:
        #   - has a `typecheck` script      -> run it (never skipped)
        #   - else NO tracked TS at all     -> nothing to typecheck. Content-only
        #     extensions (pure cinatra/** oas.json / SKILL.md / workflow.bpmn) ship
        #     no TypeScript; `tsc` would error TS18003 "No inputs were found".
        #     The pathspec covers every TS extension (.ts/.tsx/.mts/.cts).
        #   - else depends on `typescript`  -> local `tsc --noEmit`
        #   - else                          -> ephemeral `tsc` via npx (NOT
        #     `pnpm dlx`, which fails ERR_PNPM_DLX_MULTIPLE_BINS: the typescript
        #     package ships two bins, tsc + tsserver, and dlx can't disambiguate).
        # The repo always ships a standalone tsconfig.json, so tsc has config.
        run: |
          if node -e "process.exit(((require('./package.json').scripts)||{}).typecheck?0:1)"; then
            corepack pnpm run typecheck
          elif [ -z "$(git ls-files '*.ts' '*.tsx' '*.mts' '*.cts')" ]; then
            echo "No TypeScript sources tracked — nothing to typecheck (content-only extension)."
            exit 0
          elif node -e "p=require('./package.json');d={...p.dependencies,...p.devDependencies};process.exit(d.typescript?0:1)"; then
            corepack pnpm exec tsc --noEmit
          else
            npx -y -p typescript tsc --noEmit
          fi

      - name: Test
        run: corepack pnpm test --if-present

      - name: Pack (dry run)
        run: npm pack --dry-run

  kind-gates:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      # NOTE: kind-specific gates are appended here by the extraction script.
      # For workflow/agent kinds the placeholder below is replaced with a step
      # that runs the self-contained, zero-dependency `extension-kind-gate.mjs`
      # shipped into the repo (plain `node`, no @cinatra-ai dependency).
      # Other kinds (connector, artifact, skill) have no extra gate today.
      - name: No kind-specific gate
        run: echo "No kind-specific gate for this extension kind."
